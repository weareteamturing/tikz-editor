name: Release desktop

on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - platform: windows-latest
            args: ""
            rust_targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.rust_targets == ''

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.rust_targets != ''
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Write App Store Connect API key
        if: runner.os == 'macOS'
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/private_keys"
          printf "%s" "$APPLE_API_PRIVATE_KEY" > "$GITHUB_WORKSPACE/private_keys/AuthKey_${APPLE_API_KEY}.p8"

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ github.workspace }}/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          tagName: app-v__VERSION__
          releaseName: TikZ Editor v__VERSION__
          releaseBody: See the assets to download this version and install.
          releaseDraft: true
          prerelease: false

  publish-updater-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Resolve release tag
        run: |
          VERSION="$(node -p "require('./apps/desktop/src-tauri/tauri.conf.json').version")"
          echo "tag=app-v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download generated updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p updater-manifest
          gh release download "${{ steps.version.outputs.tag }}" \
            --pattern latest.json \
            --dir updater-manifest \
            --clobber

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ steps.version.outputs.tag }}" --draft=false --latest

      - name: Upload updater manifest to FTP
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          curl --fail --ftp-create-dirs \
            --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            --upload-file updater-manifest/latest.json \
            "ftp://w008ef9a.kasserver.com:21/editor/latest.json"
